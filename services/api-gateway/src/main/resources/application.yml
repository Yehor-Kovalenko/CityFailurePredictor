server:
  port: 9191

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: example-service
          uri: lb://EXAMPLE-SERVICE
          predicates:
            - Path=/example/**

eureka:
  instance:
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always