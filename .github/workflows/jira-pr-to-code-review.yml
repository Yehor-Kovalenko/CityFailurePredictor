name: Jira – PR Opened → Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  move-to-code-review:
    # Skip draft PRs — only trigger when actually ready
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Extract Jira issue key from branch name or PR title
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Try branch name first, then PR title
          ISSUE_KEY=$(echo "$BRANCH $PR_TITLE" | grep -oP '(?i)[A-Z][A-Z0-9]+-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')

          if [ -z "$ISSUE_KEY" ]; then
            echo "No Jira issue key found in branch '$BRANCH' or PR title '$PR_TITLE'"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Extracted issue key: $ISSUE_KEY"
          fi

      - name: Get Jira transitions
        if: steps.extract.outputs.found == 'true'
        id: transitions
        run: |
          RESPONSE=$(curl -s \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue_key }}/transitions")
          echo "transitions=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Move issue to Code Review
        if: steps.extract.outputs.found == 'true'
        run: |
          ISSUE_KEY="${{ steps.extract.outputs.issue_key }}"

          # Find the transition ID for "GH needs review transition" (case-insensitive)
          TRANSITION_ID=$(echo '${{ steps.transitions.outputs.transitions }}' | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          transitions = data.get('transitions', [])
          for t in transitions:
              if t['name'].lower() in ['GH needs review transition', 'needs review']:
                  print(t['id'])
                  break
          ")

          if [ -z "$TRANSITION_ID" ]; then
            echo "ERROR: Could not find 'NEEDS REVIEW' transition."
            echo "Available transitions:"
            echo '${{ steps.transitions.outputs.transitions }}' | python3 -c "import sys,json; [print(f\"  - {t['id']}: {t['name']}\") for t in json.load(sys.stdin).get('transitions',[])]"
            exit 1
          fi

          echo "Using transition ID: $TRANSITION_ID"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"transition\": {\"id\": \"$TRANSITION_ID\"}}" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/$ISSUE_KEY/transitions")

          if [ "$HTTP_STATUS" -eq 204 ]; then
            echo "✅ Successfully moved $ISSUE_KEY to Code Review"
          else
            echo "❌ Failed to transition issue. HTTP status: $HTTP_STATUS"
            exit 1
          fi

      - name: Add PR link comment to Jira issue
        if: steps.extract.outputs.found == 'true'
        run: |
          ISSUE_KEY="${{ steps.extract.outputs.issue_key }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          REPO="${{ github.repository }}"

          COMMENT_BODY=$(cat <<EOF
          {
            "body": {
              "type": "doc",
              "version": 1,
              "content": [
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "emoji",
                      "attrs": { "shortName": ":eyes:", "text": "👀" }
                    },
                    {
                      "type": "text",
                      "text": " Pull Request opened and ready for review:"
                    }
                  ]
                },
                {
                  "type": "bulletList",
                  "content": [
                    {
                      "type": "listItem",
                      "content": [
                        {
                          "type": "paragraph",
                          "content": [
                            { "type": "text", "text": "PR #$PR_NUMBER: ", "marks": [{"type": "strong"}] },
                            {
                              "type": "text",
                              "text": "$PR_TITLE",
                              "marks": [{ "type": "link", "attrs": { "href": "$PR_URL" } }]
                            }
                          ]
                        }
                      ]
                    },
                    {
                      "type": "listItem",
                      "content": [
                        {
                          "type": "paragraph",
                          "content": [
                            { "type": "text", "text": "Repository: $REPO" },
                            { "type": "text", "text": " | Author: $AUTHOR" }
                          ]
                        }
                      ]
                    }
                  ]
                }
              ]
            }
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$COMMENT_BODY" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/$ISSUE_KEY/comment")

          if [ "$HTTP_STATUS" -eq 201 ]; then
            echo "✅ PR link comment added to $ISSUE_KEY"
          else
            echo "❌ Failed to add comment. HTTP status: $HTTP_STATUS"
          fi
